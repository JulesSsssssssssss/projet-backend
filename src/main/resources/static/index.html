<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ── Vue : Authentification ── -->
  <div id="view-auth" class="view active">
    <div class="auth-box">
      <h1>Card Game</h1>

      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" data-tab="login"    aria-selected="true">Connexion</button>
        <button class="tab"        role="tab" data-tab="register" aria-selected="false">Inscription</button>
      </div>

      <form id="form-login" class="tab-content active" novalidate>
        <label for="login-username">Nom d'utilisateur</label>
        <input id="login-username" type="text"     autocomplete="username"         placeholder="ex: joueur42" maxlength="20">
        <label for="login-password">Mot de passe</label>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••">
        <button type="submit">Se connecter</button>
      </form>

      <form id="form-register" class="tab-content" novalidate>
        <label for="reg-username">Nom d'utilisateur</label>
        <input id="reg-username" type="text"     autocomplete="username"    placeholder="ex: joueur42" maxlength="20">
        <label for="reg-email">Email</label>
        <input id="reg-email"    type="email"    autocomplete="email"       placeholder="ex: vous@mail.com" maxlength="254">
        <label for="reg-password">Mot de passe</label>
        <input id="reg-password" type="password" autocomplete="new-password" placeholder="min. 6 caractères">
        <button type="submit">S'inscrire</button>
      </form>

      <p id="auth-error" class="error" role="alert" aria-live="polite"></p>
    </div>
  </div>

  <!-- ── Vue : Dashboard ── -->
  <div id="view-dashboard" class="view">
    <header class="app-header">
      <span class="header-user">Bienvenue, <strong id="dash-username"></strong></span>
      <span class="points-badge" title="Vos points">&#9889; <span id="dash-points">0</span> pts</span>
      <button id="btn-logout" class="btn-sm">Déconnexion</button>
    </header>

    <main class="dash-main">
      <section class="gacha-section" aria-label="Tirage de carte">
        <button id="btn-pull" class="btn-pull">PULL (100 pts)</button>
        <div id="gacha-result" class="gacha-result hidden" aria-live="polite"></div>
      </section>

      <nav class="dash-nav" aria-label="Navigation principale">
        <button id="btn-to-inventory">Mon inventaire</button>
        <button id="btn-to-trades">Échanges</button>
      </nav>
    </main>
  </div>

  <!-- ── Vue : Inventaire ── -->
  <div id="view-inventory" class="view">
    <header class="app-header">
      <button id="btn-inv-back" class="btn-sm">&#8592; Retour</button>
      <h2>Mon inventaire</h2>
      <span class="points-badge">&#9889; <span id="inv-points">0</span> pts</span>
    </header>
    <div id="inventory-grid" class="card-grid" role="list" aria-label="Vos cartes"></div>
  </div>

  <!-- ── Vue : Échanges ── -->
  <div id="view-trades" class="view">
    <header class="app-header">
      <button id="btn-trades-back" class="btn-sm">&#8592; Retour</button>
      <h2>Échanges</h2>
    </header>

    <div class="trades-layout">
      <section class="trades-section">
        <h3>Échanges en attente</h3>
        <div id="trades-list" aria-live="polite"></div>
      </section>

      <section class="trades-section">
        <h3>Proposer un échange</h3>
        <form id="form-trade" novalidate>
          <label for="trade-offered">ID carte offerte</label>
          <input id="trade-offered"   type="number" min="1" placeholder="ex: 3">
          <label for="trade-target">Nom d'utilisateur cible</label>
          <input id="trade-target"    type="text"   placeholder="ex: alice" maxlength="20">
          <label for="trade-requested">ID carte demandée</label>
          <input id="trade-requested" type="number" min="1" placeholder="ex: 7">
          <button type="submit">Proposer</button>
        </form>
        <p id="trade-msg" class="msg" role="status" aria-live="polite"></p>
      </section>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
